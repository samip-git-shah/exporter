name: Build TC-Exporter bundles

# Builds self-contained PyInstaller bundles for Windows, Linux, and macOS
# (Apple Silicon + Intel). Each runner installs Chromium into the playwright
# package via PLAYWRIGHT_BROWSERS_PATH=0 so the browser ships inside the zip.
#
# The build is split into discrete steps so any failure is attributable to
# a single command rather than the all-in-one build.py wrapper.

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  # Bundle Chromium *inside* the playwright package so PyInstaller bundles it.
  PLAYWRIGHT_BROWSERS_PATH: "0"
  # Be patient with the Chromium download on slow runners.
  PLAYWRIGHT_DOWNLOAD_CONNECTION_TIMEOUT: "120000"

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
          - os: ubuntu-22.04
            label: linux-x64
          - os: macos-13      # Intel
            label: macos-x64
          - os: macos-14      # Apple Silicon
            label: macos-arm64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Diagnostics
        shell: bash
        run: |
          echo "=== runner ==="
          uname -a || true
          echo "=== python ==="
          python -VV
          python -c "import platform; print(platform.platform()); print(platform.machine())"
          echo "=== free disk ==="
          df -h . || true

      - name: Windows — enable long paths
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -Type DWord -Force
          git config --system core.longpaths true

      - name: Linux — install Chromium runtime libs
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm1 libnss3 libxkbcommon0 libasound2 \
              libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxdamage1 \
              libxcomposite1 libxrandr2 libpango-1.0-0 libcairo2

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements.txt
          python -m pip freeze

      - name: Install Chromium into the playwright package
        shell: bash
        run: |
          python -m playwright install chromium
          python -c "import playwright, os, pathlib; \
            root = pathlib.Path(playwright.__file__).parent / 'driver' / 'package' / '.local-browsers'; \
            print('chromium tree:', root); \
            [print(' ', p.relative_to(root)) for p in list(root.rglob('*'))[:5]] if root.exists() else print('  (browsers stored elsewhere)')"

      - name: Run PyInstaller
        shell: bash
        run: |
          python -m PyInstaller --clean --noconfirm --log-level WARN TestCaseExporter.spec

      - name: macOS — ad-hoc sign the .app
        if: runner.os == 'macOS'
        run: |
          if [ -d "dist/TestCaseExporter.app" ]; then
            codesign --force --deep --sign - dist/TestCaseExporter.app
            codesign --verify --verbose dist/TestCaseExporter.app || true
          fi

      - name: Package zip (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          ARCH=$(python -c "import platform; print(platform.machine().lower())")
          ZIP="dist/TestCaseExporter-darwin-${ARCH}.zip"
          if [ -d "dist/TestCaseExporter.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent dist/TestCaseExporter.app "$ZIP"
          else
            python scripts/zip_bundle.py
          fi
          ls -la dist/

      - name: Package zip (Windows + Linux)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/zip_bundle.py
          ls -la dist/

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TestCaseExporter-${{ matrix.label }}
          path: dist/TestCaseExporter-*.zip
          if-no-files-found: error
          retention-days: 30

  release:
    name: Attach bundles to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/TestCaseExporter-*.zip
          generate_release_notes: true
